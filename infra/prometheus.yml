global:
  scrape_interval: 15s

scrape_configs:
  - job_name: 'api-gateway'
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ['api-gateway:8080']

  - job_name: 'notification-router'
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ['notification-router:8081']

  - job_name: 'email-service'
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ['email-service:8082']

  - job_name: 'push-service'
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ['push-service:8083']

  - job_name: 'dlt-monitor'
    metrics_path: /actuator/prometheus
    static_configs:
      - targets: ['dlt-monitor:8085']