server:
  port: 8083

spring:
  application:
    name: push-service

  threads:
    virtual:
      enabled: true

  kafka:
    template:
      observation-enabled: true
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:19092}
    consumer:
      group-id: push-service-group
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.ErrorHandlingDeserializer
      auto-offset-reset: earliest
      enable-auto-commit: false
      properties:
        spring.deserializer.value.delegate.class: org.springframework.kafka.support.serializer.JsonDeserializer
        spring.json.trusted.packages: "com.common.event"
        spring.json.value.default.type: "com.common.event.NotificationEvent"
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      properties:
        spring.json.add.type.headers: false
    listener:
      concurrency: 3
      ack-mode: manual
      observation-enabled: true    # consumer extracts trace headers

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: 6379

management:
  endpoints:
    web:
      exposure:
        include: health, prometheus
  metrics:
    tags:
      application: ${spring.application.name}
  health:
    kafka:
      enabled: true

logging:
  level:
    com:
      push:
        pushservice: DEBUG
  pattern:
    level: "%5p [%d{yyyy-MM-dd HH:mm:ss.SSS}] [${spring.application.name}] [traceId=%X{traceId}, spanId=%X{spanId}] %logger{36} : %msg%n"
